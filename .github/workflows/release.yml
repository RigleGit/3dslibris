name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
    steps:
      - uses: actions/checkout@v5

      - name: Prepare release notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          notes_dir=".github/release-notes"
          notes_file="${notes_dir}/${tag}.md"
          if [[ -f "${notes_file}" ]]; then
            cp "${notes_file}" release-notes.md
            exit 0
          fi

          prev_tag="$(git tag --sort=-creatordate | grep '^v' | grep -vx "${tag}" | head -n 1 || true)"
          {
            echo "## ${tag}"
            echo
            echo "Automated release artifacts."
            echo
            if [[ -n "${prev_tag}" ]]; then
              echo "### Changes since ${prev_tag}"
              git log --no-merges --format='- %s' "${prev_tag}..${tag}" || true
            else
              echo "### Changes"
              git log --no-merges --format='- %s' -n 10 "${tag}" || true
            fi
            echo
            echo "### Included assets"
            echo "- \`3dslibris.3dsx\`"
            echo "- \`3dslibris-debug.3dsx\`"
            echo "- \`3dslibris.cia\`"
            echo "- \`3dslibris-sdmc.zip\`"
          } > release-notes.md

      - name: Build CIA tool image
        run: |
          set -euo pipefail
          docker build -f docker/Dockerfile.cia -t 3dslibris/devkitarm-cia:ci .

      - name: Build 3DSX and SD package
        run: |
          set -euo pipefail
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            --user "${uid}:${gid}" \
            -v "$PWD:/project" -w /project \
            -e DEVKITPRO="$DEVKITPRO" \
            -e DEVKITARM="$DEVKITARM" \
            devkitpro/devkitarm \
            sh -lc 'make clean && make -j2 && make zip-sdmc && make debug-3dsx'

      - name: Build CIA
        run: |
          set -euo pipefail
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            --user "${uid}:${gid}" \
            -v "$PWD:/project" -w /project \
            -e DEVKITPRO="$DEVKITPRO" \
            -e DEVKITARM="$DEVKITARM" \
            3dslibris/devkitarm-cia:ci \
            make cia

      - name: Verify release outputs
        run: |
          set -euo pipefail
          test -f 3dslibris.3dsx
          test -f 3dslibris.smdh
          test -f 3dslibris.elf
          test -f 3dslibris-debug.3dsx
          test -f 3dslibris.cia
          test -f dist/3dslibris-sdmc.zip

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file release-notes.md
            gh release upload "$tag" \
              3dslibris.3dsx#3dslibris.3dsx \
              3dslibris-debug.3dsx#3dslibris-debug.3dsx \
              3dslibris.smdh#3dslibris.smdh \
              3dslibris.elf#3dslibris.elf \
              3dslibris.cia#3dslibris.cia \
              dist/3dslibris-sdmc.zip#3dslibris-sdmc.zip \
              --clobber
          else
            gh release create "$tag" \
              3dslibris.3dsx#3dslibris.3dsx \
              3dslibris-debug.3dsx#3dslibris-debug.3dsx \
              3dslibris.smdh#3dslibris.smdh \
              3dslibris.elf#3dslibris.elf \
              3dslibris.cia#3dslibris.cia \
              dist/3dslibris-sdmc.zip#3dslibris-sdmc.zip \
              --title "$tag" \
              --notes-file release-notes.md
          fi
