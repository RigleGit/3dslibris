name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVKITPRO: /opt/devkitpro
  DEVKITARM: /opt/devkitpro/devkitARM
  DEVKITARM_IMAGE: devkitpro/devkitarm:20260221

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  hygiene-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Required docs/legal files
        run: |
          set -euo pipefail
          required=(README.md LICENSE THIRD_PARTY_NOTICES.md CONTRIBUTING.md)
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "Missing required file: $f"
              exit 1
            fi
          done

      - name: No generated artifacts tracked
        run: |
          set -euo pipefail
          bad="$(git ls-files | grep -E '^(build/|.*\.(o|d|map|lst|elf|3dsx|smdh|cia)$)' || true)"
          if [[ -n "$bad" ]]; then
            echo "Tracked generated artifacts are forbidden:"
            echo "$bad"
            exit 1
          fi

  test-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run host tests
        run: |
          set -euo pipefail
          make test-host

  build-3dsx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: |
          set -euo pipefail
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            --user "${uid}:${gid}" \
            -v "$PWD:/project" -w /project \
            -e DEVKITPRO="$DEVKITPRO" \
            -e DEVKITARM="$DEVKITARM" \
            "$DEVKITARM_IMAGE" \
            sh -lc 'make clean && make -j2 && make debug-3dsx'

      - name: Verify outputs
        run: |
          set -euo pipefail
          test -f 3dslibris.3dsx
          test -f 3dslibris.smdh
          test -f 3dslibris.elf
          test -f 3dslibris-debug.3dsx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3dslibris-build
          path: |
            3dslibris.3dsx
            3dslibris.smdh
            3dslibris.elf
            3dslibris-debug.3dsx

  build-cia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build CIA toolchain image
        run: |
          set -euo pipefail
          docker build -f docker/Dockerfile.cia -t 3dslibris-build .

      - name: Build CIA
        run: |
          set -euo pipefail
          uid="$(id -u)"
          gid="$(id -g)"
          docker run --rm \
            --user "${uid}:${gid}" \
            -v "$PWD:/project" -w /project \
            -e DEVKITPRO="$DEVKITPRO" \
            -e DEVKITARM="$DEVKITARM" \
            3dslibris-build \
            sh -lc 'make clean && make -j2 && make debug-3dsx && make cia'

      - name: Verify CIA outputs
        run: |
          set -euo pipefail
          test -f 3dslibris.cia
          test -f 3dslibris.3dsx
          test -f 3dslibris-debug.3dsx
          test -f dist/romfs/3ds/3dslibris/font/LiberationSerif-Regular.ttf
          test -f dist/romfs/3ds/3dslibris/resources/splash.jpg

      - name: Upload CIA artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 3dslibris-cia-build
          path: |
            3dslibris.cia
            3dslibris.3dsx
            3dslibris-debug.3dsx

  run-tests:
    runs-on: ubuntu-latest
    needs: build-3dsx
    steps:
      - uses: actions/checkout@v5

      - name: Run host tests
        run: |
          set -euo pipefail
          failed=0
          for t in tests/test_*.sh; do
            echo "=== Running $t ==="
            if ! bash "$t"; then
              echo "FAILED: $t"
              failed=1
            fi
          done
          exit $failed